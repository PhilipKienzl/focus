name: Build macOS binary manually

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show build environment
        run: |
          go version
          uname -a
          sw_vers

      - name: Download Go modules
        run: go mod download

      - name: Build arm64
        run: |
          mkdir -p dist/arm64
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -o dist/arm64/focus ./cmd/focus

      - name: Build amd64
        run: |
          mkdir -p dist/amd64
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -o dist/amd64/focus ./cmd/focus

      - name: Create checksums
        run: |
          cd dist
          shasum -a 256 arm64/focus amd64/focus > checksums.txt
          cat checksums.txt

      - name: Package artifacts
        run: |
          cd dist
          tar -czf focus-darwin-arm64.tar.gz -C arm64 focus
          tar -czf focus-darwin-amd64.tar.gz -C amd64 focus

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focus-macos-build
          path: |
            dist/focus-darwin-arm64.tar.gz
            dist/focus-darwin-amd64.tar.gz
            dist/checksums.txt
